{% extends "base.html" %}

{% block title %}Join Story - AndThen{% endblock %}

{% block content %}

<a class="back-link" href="/">←</a>

<header class="page-header">
    <h1>Join Story</h1>
    <p class="tagline">Enter the PIN and choose a nickname.</p>
</header>

<form action="/join" method="post">

    <input
        id="pin-input"
        type="text"
        name="pin"
        placeholder="PIN"
        maxlength="4"
        inputmode="numeric"
        autocomplete="off"
        required
        autofocus>

    <input
        id="nickname-input"
        type="text"
        name="nickname"
        placeholder="Your nickname"
        maxlength="20"
        autocomplete="off"
        required>

    <button id="join-button" type="submit" disabled>
        Join Story
    </button>

</form>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/join.js') }}"></script>
{% endblock %}
