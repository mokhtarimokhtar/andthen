{% extends "base.html" %}

{% block title %}AndThen{% endblock %}

{% block content %}

<header class="page-header home-header">

  <h1>AndThen</h1>

  <p class="tagline">
    Write stories together.<br>
    One sentence at a time.
  </p>

</header>

<section class="action-stack">

  <a class="button" href="/create">
    Create Story
  </a>

  <button
    id="join-button"
    class="secondary"
    type="button">
    Join Story
  </button>

</section>

<div id="resume-container" class="resume-link" hidden>

  <a id="resume-button" href="#">
    Continue your story →
  </a>

</div>

<section id="recent-stories" hidden>

  <hr>

  <h2>Recent Stories</h2>

  <ul id="stories-list"></ul>

</section>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
