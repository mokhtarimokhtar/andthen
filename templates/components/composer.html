<footer class="composer-shell">

  <form id="sentence-form" class="composer">

    <textarea
      id="sentence-input"
      placeholder="Write the next sentence..."></textarea>

    <div class="composer-meta">

      <p id="turn-message"></p>

      <div class="composer-actions">
        <button
          id="send-button"
          class="composer-send"
          type="submit">
          <span class="material-symbols-rounded">arrow_upward</span>
        </button>
      </div>

    </div>

  </form>

</footer>
