{% extends "base.html" %}

{% block title %}Final Story - AndThen{% endblock %}

{% block content %}

<div class="end-page">

  <header class="end-header">

    <div class="story-topbar">
      <a class="story-back" href="/" aria-label="Back">
        <span class="material-symbols-rounded">arrow_back</span>
      </a>

      <strong>Our Story</strong>
    </div>

    <p class="story-credits">
      by {{ story.authors | join(" · ") }}
    </p>

  </header>

  <main class="end-content">
    <article id="final-story" class="final-story">
      {% for sentence in story.sentences %}
      <p>{{ sentence.content }}</p>
      {% endfor %}

    </article>
  </main>

  <footer class="end-footer">
    <button id="share-button" type="button">
      Share Story
    </button>

    <a class="button secondary" href="/">
      New Story
    </a>
  </footer>

</div>

{% endblock %}

{% block scripts %}
<script>
  const GAME_PIN = "{{ story.pin }}";
</script>

<script src="{{ url_for('static', filename='js/end.js') }}"></script>
{% endblock %}
